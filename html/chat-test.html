<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TMS Chat Test</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f6fa;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      display: grid;
      grid-template-columns: 350px 1fr;
      gap: 20px;
    }

    .card {
      background: #fff;
      padding: 16px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      margin-bottom: 16px;
    }

    h2, h3 {
      margin-top: 0;
    }

    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      box-sizing: border-box;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    .danger {
      background: #dc2626;
    }

    .danger:hover {
      background: #b91c1c;
    }

    .success {
      color: green;
      font-weight: bold;
    }

    .error {
      color: red;
      font-weight: bold;
    }

    .hint {
      color: #555;
      font-size: 13px;
      margin-top: 8px;
      line-height: 1.4;
    }

    #messages {
      height: 420px;
      overflow-y: auto;
      background: #f9fafb;
      border: 1px solid #ddd;
      padding: 12px;
      border-radius: 8px;
    }

    .message {
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      max-width: 75%;
      word-break: break-word;
    }

    .me {
      background: #dbeafe;
      margin-left: auto;
      text-align: right;
    }

    .other {
      background: #e5e7eb;
      margin-right: auto;
    }

    .small {
      font-size: 12px;
      color: #555;
      margin-top: 6px;
    }

    .attachment-box {
      margin-top: 8px;
      padding: 8px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid #d1d5db;
    }

    .attachment-img {
      display: block;
      max-width: 220px;
      max-height: 180px;
      border-radius: 8px;
      margin-top: 8px;
      margin-left: auto;
    }

    .other .attachment-img {
      margin-left: 0;
      margin-right: auto;
    }

    pre {
      background: #111827;
      color: #e5e7eb;
      padding: 12px;
      border-radius: 8px;
      height: 220px;
      overflow-y: auto;
      font-size: 12px;
    }

    a {
      color: #2563eb;
    }
  </style>
</head>

<body>
  <h2>TMS 1-to-1 Chat Test UI</h2>

  <div class="container">
    <div>
      <div class="card">
        <h3>1. Connect Socket</h3>

        <label>Backend URL</label>
        <input id="serverUrl" value="http://localhost:3000" />

        <label>Access Token</label>
        <textarea id="token" rows="5" placeholder="Paste JWT access token here"></textarea>

        <button type="button" onclick="connectSocket()">Connect</button>
        <button type="button" class="danger" onclick="disconnectSocket()">Disconnect</button>

        <p>Status: <span id="status" class="error">Disconnected</span></p>
        <p>Socket ID: <span id="socketId">-</span></p>
      </div>

      <div class="card">
        <h3>2. Conversation</h3>

        <label>Receiver User ID</label>
        <input id="toUserId" placeholder="Example: 2" />

        <button type="button" onclick="getConversation()">Find/Create Conversation</button>

        <label>Conversation ID</label>
        <input id="conversationId" placeholder="Conversation ID" />

        <button type="button" onclick="loadMessages()">Load Old Messages</button>
        <button type="button" onclick="markRead()">Mark Conversation Read</button>
      </div>

      <div class="card">
        <h3>3. Attachment</h3>

        <input type="file" id="fileInput" />
        <div class="hint">
          File ko manually upload karne ki zarurat nahi. Send button click karte hi file pehle upload hogi, phir socket se message send hoga.
        </div>

        <button type="button" class="danger" onclick="clearSelectedFile()">Clear Selected File</button>
      </div>
    </div>

    <div>
      <div class="card">
        <h3>4. Chat</h3>

        <div id="messages"></div>

        <textarea id="messageInput" rows="3" placeholder="Type message..."></textarea>

        <button type="button" id="sendBtn" onclick="sendMessage(event)">Send Message</button>
        <button type="button" onclick="sendTyping()">Typing</button>
        <button type="button" onclick="sendStopTyping()">Stop Typing</button>
      </div>

      <div class="card">
        <h3>Logs</h3>
        <pre id="logs"></pre>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <script>
    let socket = null;

    function getServerUrl() {
      return document.getElementById("serverUrl").value.trim();
    }

    function getToken() {
      return document.getElementById("token").value.trim();
    }

    function log(title, data) {
      const logs = document.getElementById("logs");

      const output = `[${new Date().toLocaleTimeString()}] ${title}\n${
        typeof data === "string" ? data : JSON.stringify(data, null, 2)
      }\n\n`;

      logs.textContent = output + logs.textContent;
    }

    function setStatus(isConnected) {
      const status = document.getElementById("status");

      if (isConnected) {
        status.textContent = "Connected";
        status.className = "success";
      } else {
        status.textContent = "Disconnected";
        status.className = "error";
      }
    }

    function buildAttachmentHtml(message) {
      const attachmentUrl = message.attachmentUrl || message.attachment_url;
      const attachmentName =
        message.attachmentName || message.attachment_name || "Attachment";
      const attachmentType =
        message.attachmentType || message.attachment_type || "";

      if (!attachmentUrl) {
        return "";
      }

      const fullFileUrl = `${getServerUrl()}${attachmentUrl}`;

      if (attachmentType.startsWith("image/")) {
        return `
          <div class="attachment-box">
            <a href="${fullFileUrl}" target="_blank">${attachmentName}</a>
            <img class="attachment-img" src="${fullFileUrl}" alt="${attachmentName}" />
          </div>
        `;
      }

      if (attachmentType === "application/pdf") {
        return `
          <div class="attachment-box">
            📄 <a href="${fullFileUrl}" target="_blank">${attachmentName}</a>
          </div>
        `;
      }

      return `
        <div class="attachment-box">
          📎 <a href="${fullFileUrl}" target="_blank" download>${attachmentName}</a>
        </div>
      `;
    }

    function addMessage(message, type = "other") {
      const messagesBox = document.getElementById("messages");

      const div = document.createElement("div");
      div.className = `message ${type}`;

      div.innerHTML = `
        <div>${message.message || ""}</div>
        ${buildAttachmentHtml(message)}
        <div class="small">
          ID: ${message.id || "-"} |
          Status: ${message.status || "-"} |
          Sender: ${message.senderId || message.sender_id || "-"}
        </div>
      `;

      messagesBox.appendChild(div);
      messagesBox.scrollTop = messagesBox.scrollHeight;
    }

    function connectSocket() {
      const serverUrl = getServerUrl();
      const token = getToken();

      if (!token) {
        alert("Please paste access token first");
        return;
      }

      if (socket && socket.connected) {
        log("Socket already connected", { socketId: socket.id });
        return;
      }

      socket = io(serverUrl, {
        transports: ["websocket"],
        auth: {
          token,
        },
      });

      socket.on("connect", () => {
        setStatus(true);
        document.getElementById("socketId").textContent = socket.id;

        log("Socket connected", {
          socketId: socket.id,
        });

        socket.emit("register_user", (response) => {
          log("register_user response", response);
        });
      });

      socket.on("disconnect", () => {
        setStatus(false);
        document.getElementById("socketId").textContent = "-";
        log("Socket disconnected", "");
      });

      socket.on("connect_error", (error) => {
        setStatus(false);
        log("Socket connect_error", {
          message: error.message,
          description: error.description,
        });
      });

      socket.on("registered", (data) => {
        log("registered", data);
      });

      socket.on("receive_message", (message) => {
        log("receive_message", message);
        addMessage(message, "other");

        socket.emit("message_delivered", {
          messageId: message.id,
        });
      });

      socket.on("message_saved", (message) => {
        log("message_saved", message);
      });

      socket.on("message_delivered", (data) => {
        log("message_delivered", data);
      });

      socket.on("message_read", (data) => {
        log("message_read", data);
      });

      socket.on("typing", (data) => {
        log("typing", data);
      });

      socket.on("stop_typing", (data) => {
        log("stop_typing", data);
      });

      socket.on("user_presence_changed", (data) => {
        log("user_presence_changed", data);
      });
    }

    function disconnectSocket() {
      if (socket) {
        socket.disconnect();
        socket = null;
      }

      setStatus(false);
    }

    async function getConversation() {
      const serverUrl = getServerUrl();
      const token = getToken();
      const toUserId = document.getElementById("toUserId").value.trim();

      if (!toUserId) {
        alert("Receiver User ID required");
        return;
      }

      const response = await fetch(`${serverUrl}/chat/conversations/with/${toUserId}`, {
        method: "GET",
        headers: {
          Authorization: `Bearer ${token}`,
        },
      });

      const result = await response.json();
      log("get conversation", result);

      if (result.success && result.data?.id) {
        document.getElementById("conversationId").value = result.data.id;
      }
    }

    async function loadMessages() {
      const serverUrl = getServerUrl();
      const token = getToken();
      const conversationId = document.getElementById("conversationId").value.trim();

      if (!conversationId) {
        alert("Conversation ID required");
        return;
      }

      const response = await fetch(
        `${serverUrl}/chat/conversations/${conversationId}/messages?page=1&limit=50`,
        {
          method: "GET",
          headers: {
            Authorization: `Bearer ${token}`,
          },
        }
      );

      const result = await response.json();
      log("load messages", result);

      document.getElementById("messages").innerHTML = "";

      if (result.success && result.data?.messages) {
        result.data.messages.forEach((message) => {
          addMessage(message, "other");
        });
      }
    }

    async function uploadSelectedFile(file) {
      const serverUrl = getServerUrl();
      const token = getToken();

      const formData = new FormData();
      formData.append("file", file);

      const response = await fetch(`${serverUrl}/chat/upload`, {
        method: "POST",
        headers: {
          Authorization: `Bearer ${token}`,
        },
        body: formData,
      });

      const result = await response.json();
      log("upload file", result);

      if (!result.success) {
        throw new Error(result.message || "File upload failed");
      }

      return result.data;
    }

    async function sendMessage(event) {
      event?.preventDefault?.();

      if (!socket || !socket.connected) {
        alert("Socket not connected");
        return false;
      }

      const sendBtn = document.getElementById("sendBtn");
      const toUserId = document.getElementById("toUserId").value.trim();
      const message = document.getElementById("messageInput").value.trim();
      const fileInput = document.getElementById("fileInput");
      const selectedFile = fileInput.files[0];

      if (!toUserId) {
        alert("Receiver User ID required");
        return false;
      }

      if (!message && !selectedFile) {
        alert("Message or attachment required");
        return false;
      }

      try {
        sendBtn.disabled = true;
        sendBtn.textContent = selectedFile ? "Uploading & Sending..." : "Sending...";

        let attachment = null;

        if (selectedFile) {
          attachment = await uploadSelectedFile(selectedFile);
        }

        const payload = {
          toUserId,
          message,
        };

        if (attachment) {
          payload.attachmentUrl = attachment.attachment_url;
          payload.attachmentName = attachment.attachment_name;
          payload.attachmentType = attachment.attachment_type;
          payload.attachmentSize = attachment.attachment_size;
        }

        socket.emit("send_message", payload, (response) => {
          log("send_message response", response);

          if (response.success) {
            addMessage(response.data, "me");

            document.getElementById("messageInput").value = "";
            fileInput.value = "";
          } else {
            alert(response.message || "Message send failed");
          }

          sendBtn.disabled = false;
          sendBtn.textContent = "Send Message";
        });
      } catch (error) {
        log("send_message error", error.message);
        alert(error.message || "Message send failed");

        sendBtn.disabled = false;
        sendBtn.textContent = "Send Message";
      }

      return false;
    }

    function clearSelectedFile() {
      document.getElementById("fileInput").value = "";
    }

    function markRead() {
      if (!socket || !socket.connected) {
        alert("Socket not connected");
        return;
      }

      const conversationId = document.getElementById("conversationId").value.trim();

      if (!conversationId) {
        alert("Conversation ID required");
        return;
      }

      socket.emit(
        "message_read",
        {
          conversationId,
        },
        (response) => {
          log("message_read response", response);
        }
      );
    }

    function sendTyping() {
      if (!socket || !socket.connected) {
        alert("Socket not connected");
        return;
      }

      const toUserId = document.getElementById("toUserId").value.trim();
      const conversationId = document.getElementById("conversationId").value.trim();

      socket.emit("typing", {
        toUserId,
        conversationId,
      });
    }

    function sendStopTyping() {
      if (!socket || !socket.connected) {
        alert("Socket not connected");
        return;
      }

      const toUserId = document.getElementById("toUserId").value.trim();
      const conversationId = document.getElementById("conversationId").value.trim();

      socket.emit("stop_typing", {
        toUserId,
        conversationId,
      });
    }
  </script>
</body>
</html>
